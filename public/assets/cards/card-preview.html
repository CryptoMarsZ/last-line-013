<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Last Line 0:13 Card Preview</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 50% 0%, rgba(105, 214, 195, 0.16), transparent 34%),
          linear-gradient(180deg, #05080b, #0b1117 52%, #030506);
        color: #efe6d2;
        font-family: "Songti SC", "Noto Serif CJK SC", serif;
      }

      main {
        max-width: 1480px;
        margin: 0 auto;
        padding: 48px 32px;
      }

      h1 {
        margin: 0 0 28px;
        font-size: 28px;
        letter-spacing: 1px;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 22px;
      }

      img {
        width: 100%;
        display: block;
        border-radius: 14px;
        filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.5));
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Last Line 0:13 - 第一批手牌</h1>
      <section class="grid">
        <img src="./full/card_action_inquire.svg" alt="询问" />
        <img src="./full/card_item_old_ticket.svg" alt="旧车票" />
        <img src="./full/card_action_breathe.svg" alt="深呼吸" />
        <img src="./full/card_action_lie.svg" alt="撒谎" />
        <img src="./full/card_item_broken_phone.svg" alt="破碎手机" />
      </section>
    </main>
  </body>
</html>
